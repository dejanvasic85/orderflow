name: Deploy Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  # Account's workers.dev subdomain — preview workers resolve to
  # https://<worker-name>.<this>.workers.dev
  workersSubdomain: vasic-studio

jobs:
  deploy-preview:
    name: Deploy preview worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Verify required secrets
        run: vp exec tsx deployment/verifyEnv.ts preview
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}

      - name: Build
        run: vp run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Compute preview worker name
        id: meta
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          branch_name="$BRANCH_NAME"
          branch_slug=$(printf '%s' "$branch_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')
          branch_slug="${branch_slug:0:24}"
          worker_name="orderflow-pr-${PR_NUMBER}-${branch_slug}"
          worker_name="${worker_name:0:63}"
          worker_name=$(printf '%s' "$worker_name" | sed -E 's/-+$//')
          echo "worker_name=$worker_name" >> "$GITHUB_OUTPUT"

          # The preview's workers.dev URL is deterministic from the worker name,
          # so we can compute it up front and inject it as SITE_URL at deploy time.
          deploy_url="https://${worker_name}.${workersSubdomain}.workers.dev"
          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"

      - name: Deploy preview
        run: |
          set -euo pipefail
          vp exec wrangler deploy \
            --name "${{ steps.meta.outputs.worker_name }}" \
            --var SITE_URL:"${{ steps.meta.outputs.deploy_url }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync Cloudflare Worker secrets
        run: vp exec tsx deployment/syncWorkerSecrets.ts "${{ steps.meta.outputs.worker_name }}"
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.meta.outputs.deploy_url }}
          PREVIEW_WORKER_NAME: ${{ steps.meta.outputs.worker_name }}
        with:
          script: |
            const marker = '<!-- preview-worker-url -->'
            const previewUrl = process.env.PREVIEW_URL
            const workerName = process.env.PREVIEW_WORKER_NAME

            const body = [
              marker,
              `Preview deployment is ready: ${previewUrl}`,
              `Worker name: \`${workerName}\``,
            ].join('\n\n')

            const { owner, repo } = context.repo
            const issue_number = context.issue.number

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.data.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }
