name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test --passWithNoTests

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Start Supabase
        run: vp exec supabase start

      - name: Reset database (migrations + seed)
        run: vp exec supabase db reset --local

      - name: Export Supabase env vars
        run: |
          echo "VITE_SUPABASE_URL=http://localhost:54321" >> $GITHUB_ENV
          echo "VITE_SUPABASE_ANON_KEY=$(vp exec supabase status --output env | grep ANON_KEY | cut -d= -f2 | tr -d '\"')" >> $GITHUB_ENV

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Run e2e tests
        run: vp exec playwright test
        env:
          CI: true

      - name: Stop Supabase
        if: always()
        run: vp exec supabase stop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
