name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test --passWithNoTests

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # config.toml resolves auth.site_url from env(SITE_URL). It must be set BEFORE
    # `supabase start` reads the config; otherwise GoTrue's site_url is empty and it
    # silently skips sending invite emails (returns 200 but nothing lands in Mailpit).
    env:
      SITE_URL: http://localhost:3344
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.0

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Start Supabase
        run: supabase start

      - name: Reset database (migrations + seed)
        run: supabase db reset --local

      - name: Write .env.local for the dev server
        run: |
          # The dev server (vp dev) resolves server-side env from .env.local, not the
          # process env Playwright passes through. Without this file, every server fn
          # that calls getServerConfig() (e.g. inviteUser via supabaseAdmin) fails its
          # Zod parse with "expected string, received undefined". R2 vars are required
          # by the schema but not exercised by the e2e happy-paths, so dummy values suffice.
          # Use the NEW-format API keys (sb_publishable_* / sb_secret_*), not the legacy
          # JWT ANON_KEY / SERVICE_ROLE_KEY. The app uses the new key format; with a legacy
          # service_role JWT, GoTrue does not treat inviteUserByEmail as a privileged invite
          # — it creates the user and returns 200 but sends NO email, which is exactly why
          # the invite e2e failed only in CI (local .env.local already uses sb_secret_*).
          SUPABASE_JSON=$(supabase status --output json)
          PUBLISHABLE_KEY=$(echo "$SUPABASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['PUBLISHABLE_KEY'])")
          SECRET_KEY=$(echo "$SUPABASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['SECRET_KEY'])")
          cat > .env.local <<EOF
          VITE_SUPABASE_URL=http://localhost:54321
          VITE_SUPABASE_ANON_KEY=$PUBLISHABLE_KEY
          SUPABASE_SECRET_KEY=$SECRET_KEY
          SITE_URL=http://localhost:3344
          R2_ACCOUNT_ID=test
          R2_ACCESS_KEY_ID=test
          R2_SECRET_ACCESS_KEY=test
          R2_BUCKET_NAME=test
          R2_PUBLIC_BASE_URL=http://localhost:54321/r2
          EOF

      - name: Diagnose invite via supabase-js (app code path)
        run: |
          # Reproduce the EXACT app path — supabase-js admin.inviteUserByEmail using the
          # keys from .env.local — and a raw curl invite, then check Mailpit for both.
          # This isolates whether the failure is in the supabase-js admin call vs the app
          # server, before Playwright even runs.
          curl -s -X DELETE "http://127.0.0.1:54324/api/v1/messages" >/dev/null
          cat > diag_invite.mjs <<'JS'
          import { createClient } from "@supabase/supabase-js";
          import { readFileSync } from "node:fs";
          import { parseEnv } from "node:util";
          const env = parseEnv(readFileSync(".env.local", "utf-8"));
          console.log("url=", env.VITE_SUPABASE_URL, "secretPrefix=", env.SUPABASE_SECRET_KEY.slice(0, 12));
          const admin = createClient(env.VITE_SUPABASE_URL, env.SUPABASE_SECRET_KEY, {
            auth: { autoRefreshToken: false, persistSession: false },
          });
          const email = `diag_appflow_${Date.now()}@bwow.com.au`;
          const { data, error } = await admin.auth.admin.inviteUserByEmail(email, {
            data: { name: "Diag App" },
            redirectTo: `${env.SITE_URL}/auth/callback`,
          });
          console.log("supabase-js invite error:", error?.message ?? "none", "userId:", data?.user?.id);
          await new Promise((r) => setTimeout(r, 2000));
          const j = await (await fetch("http://127.0.0.1:54324/api/v1/messages")).json();
          const found = (j.messages || []).some((m) => (m.To || []).some((t) => t.Address === email));
          console.log("SUPABASE-JS EMAIL IN MAILPIT:", found, "for", email);
          JS
          vp exec node diag_invite.mjs
          rm -f diag_invite.mjs
          curl -s -X DELETE "http://127.0.0.1:54324/api/v1/messages" >/dev/null

      - name: Run e2e tests
        run: vp exec playwright test
        env:
          CI: true

      - name: Dump GoTrue (auth) logs on failure
        if: failure()
        run: |
          # The app's inviteUser returns 200 but no email lands in Mailpit, while a
          # direct auth-API invite does deliver. GoTrue's own logs are the only place
          # that says why it skipped the send for the app's call.
          CID=$(docker ps --filter "name=supabase_auth" --format '{{.Names}}' | head -1)
          echo "auth container: $CID"
          docker logs "$CID" 2>&1 | tail -120

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
