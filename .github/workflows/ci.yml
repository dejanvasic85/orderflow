name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test --passWithNoTests

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.61.0

      - name: Install Playwright browsers
        run: vp exec playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Start Supabase
        run: supabase start

      - name: Reset database (migrations + seed)
        run: supabase db reset --local

      - name: Write .env.local for the dev server
        run: |
          # The dev server (vp dev) resolves server-side env from .env.local, not the
          # process env Playwright passes through. Without this file, every server fn
          # that calls getServerConfig() (e.g. inviteUser via supabaseAdmin) fails its
          # Zod parse with "expected string, received undefined". R2 vars are required
          # by the schema but not exercised by the e2e happy-paths, so dummy values suffice.
          SUPABASE_JSON=$(supabase status --output json)
          ANON_KEY=$(echo "$SUPABASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['ANON_KEY'])")
          SERVICE_ROLE_KEY=$(echo "$SUPABASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['SERVICE_ROLE_KEY'])")
          cat > .env.local <<EOF
          VITE_SUPABASE_URL=http://localhost:54321
          VITE_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SECRET_KEY=$SERVICE_ROLE_KEY
          SITE_URL=http://localhost:3344
          R2_ACCOUNT_ID=test
          R2_ACCESS_KEY_ID=test
          R2_SECRET_ACCESS_KEY=test
          R2_BUCKET_NAME=test
          R2_PUBLIC_BASE_URL=http://localhost:54321/r2
          EOF

      - name: Run e2e tests
        run: vp exec playwright test
        env:
          CI: true

      - name: Stop Supabase
        if: always()
        run: supabase stop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
