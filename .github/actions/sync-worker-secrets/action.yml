name: Sync Cloudflare Worker secrets
description: Uploads all required secrets to a Cloudflare Worker using wrangler secret bulk

inputs:
  worker_name:
    description: Worker name override (for preview deployments). Omit for production.
    required: false
    default: ""
  cloudflare_api_token:
    description: Cloudflare API token
    required: true
  cloudflare_account_id:
    description: Cloudflare account ID
    required: true
  supabase_secret_key:
    description: Supabase service role key
    required: true
  aws_access_key_id:
    description: AWS access key ID
    required: true
  aws_secret_access_key:
    description: AWS secret access key
    required: true

runs:
  using: composite
  steps:
    - name: Sync secrets
      shell: bash
      env:
        CLOUDFLARE_API_TOKEN: ${{ inputs.cloudflare_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cloudflare_account_id }}
        SUPABASE_SECRET_KEY: ${{ inputs.supabase_secret_key }}
        AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        WORKER_NAME: ${{ inputs.worker_name }}
      run: |
        name_flag=""
        if [ -n "$WORKER_NAME" ]; then
          name_flag="--name $WORKER_NAME"
        fi

        jq -n '{
          SUPABASE_SECRET_KEY: env.SUPABASE_SECRET_KEY,
          AWS_ACCESS_KEY_ID: env.AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY: env.AWS_SECRET_ACCESS_KEY
        }' | vp exec wrangler secret bulk $name_flag
