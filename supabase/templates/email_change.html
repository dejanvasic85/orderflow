<!doctype html>
<html lang="en">
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f1eeea;
      font-family:
        Outfit,
        -apple-system,
        BlinkMacSystemFont,
        &quot;Segoe UI&quot;,
        Helvetica,
        Arial,
        sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f1eeea; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 480px;
              background-color: #ffffff;
              border-radius: 12px;
              overflow: hidden;
            "
          >
            <tr>
              <td style="background-color: #7f1f2c; padding: 24px 32px">
                <span
                  style="
                    font-family: Georgia, &quot;Times New Roman&quot;, serif;
                    color: #fdf9f6;
                    font-size: 20px;
                    font-weight: 700;
                  "
                >
                  Boutique Wines of the World
                </span>
              </td>
            </tr>
            <tr>
              <td style="padding: 32px">
                <h1
                  style="
                    font-family: Georgia, &quot;Times New Roman&quot;, serif;
                    color: #201916;
                    font-size: 22px;
                    font-weight: 600;
                    margin: 0 0 16px;
                  "
                >
                  Confirm your new email
                </h1>
                <p style="color: #201916; font-size: 15px; line-height: 1.6; margin: 0 0 24px">
                  We received a request to change the email address on your account to
                  <strong>{{ .Email }}</strong>. Follow the link below to confirm the change.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="border-radius: 8px; background-color: #7f1f2c">
                      <a
                        href="{{ .ConfirmationURL }}"
                        style="
                          display: inline-block;
                          padding: 12px 24px;
                          color: #fdf9f6;
                          font-size: 15px;
                          font-weight: 600;
                          text-decoration: none;
                          border-radius: 8px;
                        "
                      >
                        Confirm new email
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="color: #706761; font-size: 13px; line-height: 1.6; margin: 24px 0 0">
                  If you didn't request this change, contact us immediately.
                </p>
              </td>
            </tr>
            <tr>
              <td style="background-color: #f1eeea; padding: 16px 32px">
                <p style="color: #706761; font-size: 12px; margin: 0">
                  Boutique Wines of the World
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
